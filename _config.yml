title: "Roy Ian Nasser | Cybersecurity Portfolio"
description: "The digital identity and portfolio of Roy Ian Nasser – Cybersecurity Enthusiast, Ethical Hacker, and Digital Defender."
url: "https://IANNASSER.github.io"
baseurl: "" # leave blank for GitHub Pages user site
repository: "IANNASSER/portfolio" # update if your repo name is different

# Theme Configuration
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "navy" # navy blue skin for a professional look

# Author details
author:
  name: "Roy Ian Nasser"
  avatar: "/assets/images/roy-nasser.jpg" # Place your photo here
  bio: "Passionate Cybersecurity Enthusiast dedicated to safeguarding digital assets and promoting ethical hacking practices."
  location: "Nairobi, Kenya"
  linkedin: "https://www.linkedin.com/in/roy-nasser"
  github: "https://github.com/IANNASSER"
  email: "your.email@example.com" # <-- Replace with your actual email

# Navigation
header_pages:
  - index.md
  - resume.md
  - projects.md
  - labs.md
  - contact.md

# Collections for Projects and Labs
collections:
  projects:
    output: true
    permalink: /projects/:title/
  labs:
    output: true
    permalink: /labs/:title/

# Social Links
social:
  type:  "Person"
  name:  "Roy Ian Nasser"
  links:
    - "https://www.linkedin.com/in/roy-nasser"
    - "https://github.com/IANNASSER"
    - "mailto:your.iannasser992@gmail.com" # <-- Replace with your actual email

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-archives

# Defaults for posts/projects/labs
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: single
      author_profile: true
      read_time: true
  - scope:
      path: ""
      type: "labs"
    values:
      layout: single
      author_profile: true
      read_time: true

# Google Analytics (optional)
# google_analytics: UA-XXXXXXXX-X

# Exclusions
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Markdown Processing
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true

# Permalinks
permalink: pretty
